font = scientifica:weight=regular, Galmuri9Bitmap:weight=regular:size=10, Binggrae:size=7:weight=regular
pad = 34x34
initial-window-size-pixels = 440x340

[scrollback]
lines = 0

[tweak]
font-monospace-warn = no
overflowing-glyphs = yes
scaling-filter = lanczos3
sixel = yes

[cursor]
blink = yes
style = block

[colors]
alpha = 1

[main]
include = /home/irhl/.config/foot/themes/foot-dark.ini
