<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

    <match target="font">
	<test name="family" qual="any">
            <string>scientifica</string>
        </test>
        <edit name="pixelsize" mode="assign">
            <int>11</int>
        </edit>
        <edit name="antialias" mode="assign">
            <bool>false</bool>
        </edit>
    </match>

  <match target="font">
	  <edit name="hinting" mode="assign">
            <bool>true</bool>
        </edit>
        <edit name="hintstyle" mode="assign">
            <const>hintfull</const>
        </edit>
        <edit name="lcdfilter" mode="assign">
            <const>lcddefault</const>
        </edit>
    </match>

  <selectfont>
    <rejectfont>
      <glob>/usr/share/fonts/TTF/DejaVu/DejaVuSans*</glob>
      <glob>/usr/share/fonts/TTF/DejaVu/DejaVuSerif*</glob>
      <glob>/usr/share/fonts/TTF/DejaVu/DejaVuMath*</glob>
      <glob>/usr/share/fonts/TTF/Liberation/LiberationSans*</glob>
      <glob>/usr/share/fonts/TTF/Liberation/LiberationSerif*</glob>
      <glob>/usr/share/fonts/TTF/Liberation/LiberationMono*</glob>
    </rejectfont>
  </selectfont>

</fontconfig>
