env:
    TERM: xterm-256color

window:
  dynamic_padding: true
  dynamic_title: true
  resize_increments: true

  decorations: none
  opacity: 1.0

  dimensions:
    columns: 50
    lines: 16

  padding:
    x: 34
    y: 34

font:
  normal:
    family: "scientifica"
    style: regular

  size: 10.5

  offset:
    x: 0
    y: 0

scrolling:
  history: 2
  multiplier: 3

cursor:
  style:
    shape: Block
    blinking: Always

  unfocused_hollow: false

import:
 - ~/.config/alacritty/themes/flowershop.yml
