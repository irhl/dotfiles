env:
    TERM: xterm-256color

window:
  dynamic_padding: true
  dynamic_title: true
  resize_increments: true

  decorations: none
  opacity: 1.0

  dimensions:
    columns: 50
    lines: 16

  padding:
    x: 34
    y: 34

font:
  normal:
    family: "scientifica"
    style: regular

  size: 10.5

  offset:
    x: 0
    y: 0

scrolling:
  history: 2
  multiplier: 3

cursor:
  style:
    shape: Block
    blinking: Always

  unfocused_hollow: false

colors:
  cursor:
    text:       "#fbeedb"
    cursor:     "#514036"

  selection:
    text:       "#fbeedb"
    background: "#514036"

  footer_bar:
    foreground: '#fbeedb'
    background: '#514036'

  primary:
    foreground: "#514036"
    background: "#fbeedb"

  normal:
    black:      "#ebdccd"
    red:        "#514036"
    green:      "#514036"
    blue:       "#B5A192"
    yellow:     "#B5A192"
    magenta:    "#514036"
    cyan:       "#514036"
    white:      "#514036"

  bright:
    black:      "#806b5d"
    red:        "#806b5d"
    green:      "#806b5d"
    blue:       "#806b5d"
    yellow:     "#806b5d"
    magenta:    "#806b5d"
    cyan:       "#806b5d"
    white:      "#806b5d"
