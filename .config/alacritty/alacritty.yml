env:
    TERM: xterm-256color

window:
  dynamic_padding: true
  decorations: none
  opacity: 1.0

  dimensions:
    columns: 50
    lines: 16

  padding:
    x: 34
    y: 34

scrolling:
  history: 2
  multiplier: 3

cursor:
  style:
    shape: Block
    blinking: Always

  unfocused_hollow: false

import:
 - ~/.config/alacritty/themes/crush.yml
